<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1544 N COLONIAL TERRACE ARLINGTON, VIRGINIA 22209 - Mike Burns Real Estate</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-359RJ8YZZY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-359RJ8YZZY');

    <link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f5f3ef;
            color: #1a1a2e;
            padding: 40px 20px 60px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        .logo-header {
            text-align: center;
            margin-bottom: 0;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            display: inline-block;
            margin-bottom: 16px;
            border-radius: 50%;
        }

        .address-header {
            text-align: center;
            padding: 30px 30px 26px;
            border: 1.5px solid #1a1a2e;
            border-top: none;
            margin-bottom: 30px;
            position: relative;
        }
        .address-header::before {
            content: '';
            display: block;
            position: absolute;
            top: -4px;
            left: -1.5px;
            right: -1.5px;
            height: 0;
            border-top: 1.5px solid #1a1a2e;
        }
        .address-header h1 {
            font-family: Georgia, serif;
            font-size: 38px;
            font-weight: normal;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #1a1a2e;
            line-height: 1.2;
        }
        .address-header h2 {
            font-family: Georgia, serif;
            font-size: 20px;
            font-weight: normal;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
            margin-top: 8px;
        }

        .hero-image {
            width: 100%;
            height: 460px;
            overflow: hidden;
            border: 1px solid #c8c0b0;
            margin-bottom: 0;
        }
        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .price-box {
            border: 1px solid #c8c0b0;
            border-top: none;
            padding: 20px;
            text-align: center;
            margin-bottom: 36px;
            background: #fff;
        }
        .price-label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 6px;
        }
        .price-amount {
            font-family: Georgia, serif;
            font-size: 38px;
            font-weight: normal;
            letter-spacing: 2px;
            color: #1a1a2e;
        }

        .section-block {
            border: 1px solid #c8c0b0;
            background: #fff;
            margin-bottom: 30px;
        }
        .section-title {
            font-family: Georgia, serif;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #1a1a2e;
            padding: 22px 24px;
            border-bottom: 1px solid #c8c0b0;
            text-align: center;
        }
        .section-body {
            padding: 24px;
        }

        .fast-details ul {
            list-style: none;
        }
        .fast-details li {
            font-size: 15px;
            line-height: 1.6;
            color: #1a1a2e;
            padding: 11px 0;
            border-bottom: 1px solid #ece8e0;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .fast-details li:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .fast-details li::before {
            content: "—";
            color: #888;
            flex-shrink: 0;
            font-size: 13px;
        }

        .specs-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border: 1px solid #c8c0b0;
            background: #fff;
            margin-bottom: 30px;
        }
        .spec-item {
            padding: 22px 10px;
            text-align: center;
            border-right: 1px solid #c8c0b0;
        }
        .spec-item:last-child {
            border-right: none;
        }
        .spec-item .value {
            font-family: Georgia, serif;
            font-size: 22px;
            font-weight: normal;
            color: #1a1a2e;
            margin-bottom: 5px;
            line-height: 1.2;
        }
        .spec-item .label {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
        }

        .description-body p {
            font-size: 15px;
            line-height: 1.9;
            color: #333;
            margin-bottom: 16px;
        }
        .description-body p:last-child {
            margin-bottom: 0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .gallery-item {
            height: 240px;
            overflow: hidden;
            background: #eee;
            border: 1px solid #c8c0b0;
            border-radius: 2px;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.04);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }
        .action-btn {
            display: block;
            text-align: center;
            padding: 22px 20px;
            border: 1px solid #1a1a2e;
            background: #fff;
            color: #1a1a2e;
            font-family: Georgia, serif;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .action-btn:hover {
            background: #1a1a2e;
            color: #fff;
        }

        .agent-section {
            border: 3px double #1a1a2e;
            background: #fff;
            padding: 44px 40px;
            text-align: center;
            margin-bottom: 0;
        }
        .agent-name {
            font-family: Georgia, serif;
            font-size: 22px;
            font-weight: normal;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .agent-brokerage {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 24px;
        }
        .agent-rule {
            border: none;
            border-top: 1px solid #c8c0b0;
            margin: 0 auto 24px;
            width: 60px;
        }
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .contact-info p,
        .contact-info a {
            font-family: Georgia, serif;
            font-size: 18px;
            color: #1a1a2e;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .contact-info a:hover {
            text-decoration: underline;
        }

        .footer-rule {
            border: none;
            border-top: 1px solid #1a1a2e;
            margin-top: 40px;
        }

        @media (max-width: 640px) {
            .address-header h1 { font-size: 24px; }
            .address-header h2 { font-size: 16px; }
            .hero-image { height: 260px; }
            .specs-bar { grid-template-columns: repeat(2, 1fr); }
            .specs-bar .spec-item:nth-child(2) { border-right: none; }
            .specs-bar .spec-item:nth-child(3) { border-top: 1px solid #c8c0b0; }
            .gallery-grid { grid-template-columns: 1fr; }
            .action-buttons { grid-template-columns: 1fr; }
            .agent-section { padding: 36px 24px; }
            .price-amount { font-size: 28px; }
        }
    </style>
</head>
